add_newline = true
command_timeout = 2000
right_format = """$git_branch$git_status$python$cmd_duration"""

format = """$username$hostname$directory
$character"""

[cmd_duration]
min_time = 500
show_milliseconds = false
format = " 󱎫 [$duration]($style)"
style = "bold #f9e2af"

[character]
success_symbol = "❯ "
error_symbol = "❯ "

[username]
show_always = false
style_user = "bold #7fbbff"
style_root = "bold #6a504a"
format = "[$user:]($style)"

[hostname]
ssh_only = true
format = "[[$hostname]󰇙]($style)"
style = "bold #6aa0ff"

[directory]
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "󰇘/"
home_symbol = "~"
read_only = ' []'
# simplified format to prevent wrap/glitch
format = "[$path$read_only]($style) "
style = "bold #66afff"

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bold #ff7f9e"

[git_status]
style = "bold #db7a8f"
format = '[\[($all_status)\]]($style) '
conflicted = ""
ahead = "⇡"
behind = "⇣"
stashed = ""
modified = ""
staged = ""
renamed = "➜"
deleted = ""
untracked = ""

[python]
symbol = "󰌠 "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
format = "[$symbol($version) $virtualenv]($style)"
style = "#eea296"

[docker_context]
disabled = true

[nodejs]
disabled = true

[ruby]
disabled = true
