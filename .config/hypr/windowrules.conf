# =======================================================================================
# HYPRLAND v0.53 COMPATIBILITY FIXES
# =======================================================================================

# ---------------------------------------------------------------------------------------
# 1. CORE BEHAVIOR
# ---------------------------------------------------------------------------------------
# Tenta pegar modais "honestos" primeiro.
windowrule = float on, match:modal true
windowrule = center on, match:modal true

# ---------------------------------------------------------------------------------------
# 2. BROWSER EXTENSIONS (Bitwarden, Metamask, etc)
# ---------------------------------------------------------------------------------------
# PROBLEMA: Zen/Firefox nascem com nome errado e mudam depois.
# SOLUÇÃO: match:title com regex frouxo (.*) + forçar tamanho pra não virar "tubo".

windowrule = float on, match:title .*Extension.*
windowrule = size 450 650, match:title .*Extension.*
windowrule = center on, match:title .*Extension.*

windowrule = float on, match:title .*Bitwarden.*
windowrule = size 450 650, match:title .*Bitwarden.*
windowrule = center on, match:title .*Bitwarden.*

windowrule = float on, match:title .*1Password.*
windowrule = size 450 650, match:title .*1Password.*
windowrule = center on, match:title .*1Password.*

windowrule = float on, match:title .*Vault.*
windowrule = size 450 650, match:title .*Vault.*
windowrule = center on, match:title .*Vault.*

# ---------------------------------------------------------------------------------------
# 3. POPUPS DE AUTH E DIALOGS (Google, GitHub, Arquivos)
# ---------------------------------------------------------------------------------------
# Pega logins, seletores de arquivos e "Sobre".

# Logins (Geralmente 800x600)
windowrule = float on, match:title .*(Sign in|Log in|Entrar|Acessar|Auth|Oauth).*
windowrule = size 800 600, match:title .*(Sign in|Log in|Entrar|Acessar|Auth|Oauth).*
windowrule = center on, match:title .*(Sign in|Log in|Entrar|Acessar|Auth|Oauth).*

windowrule = float on, match:title .*(Google|Microsoft|GitHub|Facebook).*
windowrule = size 800 600, match:title .*(Google|Microsoft|GitHub|Facebook).*
windowrule = center on, match:title .*(Google|Microsoft|GitHub|Facebook).*

# Salvar/Abrir Arquivos (Geralmente largos)
windowrule = float on, match:title .*(Open|Abrir|Save|Salvar|Select|Selecionar|Choose|Escolher).*
windowrule = size 900 600, match:title .*(Open|Abrir|Save|Salvar|Select|Selecionar|Choose|Escolher).*
windowrule = center on, match:title .*(Open|Abrir|Save|Salvar|Select|Selecionar|Choose|Escolher).*

# Propriedades
windowrule = float on, match:title .*(Properties|Propriedades|About|Sobre).*
windowrule = size 600 400, match:title .*(Properties|Propriedades|About|Sobre).*
windowrule = center on, match:title .*(Properties|Propriedades|About|Sobre).*

# ---------------------------------------------------------------------------------------
# 4. HARDWARE & TOOLS (OpenRGB Fix)
# ---------------------------------------------------------------------------------------

# OpenRGB: Janela principal tiled, janelas filhas float.
# match:class 'openrgb' pega o app, match:title filtra os popups.
windowrule = float on, match:class ^openrgb$, match:title .*(Profile|Device|Information|Resize|LED).*
windowrule = size 800 600, match:class ^openrgb$, match:title .*(Profile|Device|Information|Resize|LED).*
windowrule = center on, match:class ^openrgb$, match:title .*(Profile|Device|Information|Resize|LED).*

# Pavucontrol sempre float
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = size 800 500, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = center on, match:class ^(org.pulseaudio.pavucontrol)$

# ---------------------------------------------------------------------------------------
# 5. WORKSPACES & APPS
# ---------------------------------------------------------------------------------------

windowrule = float on, match:title .*(Picture-in-Picture).*
windowrule = move 100%-340 100%-200, match:title .*(Picture-in-Picture).*

windowrule = float on, match:class ^(org\.wezfurlong\.wezterm|wezterm|kitty|foot|alacritty|termite|st)$
windowrule = size 1000 800, match:class ^(org.wezfurlong.wezterm)$
windowrule = move 550 100, match:class ^(org.wezfurlong.wezterm)$

windowrule = workspace special:notes silent, match:class ^(com.github.xournalpp.xournalpp)$
windowrule = float on, match:class ^(com.github.xournalpp.xournalpp)$

windowrule = workspace 4, match:class ^(vesktop)$
windowrule = tile on, match:class ^(vesktop)$

windowrule = workspace 9, match:class ^(Slack)$
windowrule = tile on, match:class ^(Slack)$

windowrule = workspace 2, match:class ^(Mailspring)$
windowrule = tile on, match:class ^(Mailspring)$

windowrule = workspace 5, match:class ^(steam|heroic)$
windowrule = tile on, match:class ^(steam|heroic)$

# ---------------------------------------------------------------------------------------
# 6. BEHAVIORAL
# ---------------------------------------------------------------------------------------

windowrule = stay_focused on, match:class ^(rofi)$

# Steam Ghost Windows Fix (Essencial pro Steam não roubar foco invisível)
windowrule = stay_focused on, match:title ^$, match:class ^(steam)$
windowrule = min_size 1 1, match:title ^$, match:class ^(steam)$
windowrule = float on, match:title ^$, match:class ^(steam)$
